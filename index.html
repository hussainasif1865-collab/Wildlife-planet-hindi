<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildlife Planet Hindi | Explore the Nature</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0078d4; --bg: #000; --card-bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 100; }
        .logo { font-weight: 900; font-size: 20px; letter-spacing: 1px; text-transform: uppercase; }
        .logo span { color: var(--primary); }
        .nav-links a { color: #aaa; text-decoration: none; margin-left: 20px; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .nav-links a:hover { color: #fff; }

        /* Hero Section (BBC Style) */
        .hero { height: 60vh; background: linear-gradient(to bottom, rgba(0,0,0,0.2), #000), url('https://images.unsplash.com/photo-1516422270682-4414f6b15858?auto=format&fit=crop&w=1200') center/cover; display: flex; align-items: flex-end; padding: 50px 5%; }
        .hero-content h1 { font-size: 48px; font-weight: 900; margin: 0; line-height: 1; }
        .hero-content p { color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }

        /* Content Grid */
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; }
        .card { background: var(--card-bg); border-radius: 4px; overflow: hidden; transition: 0.3s; border: 1px solid #1a1a1a; cursor: pointer; text-decoration: none; color: inherit; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 20px; }
        .tag { color: var(--primary); font-size: 11px; font-weight: 900; text-transform: uppercase; }
        .card-title { font-size: 20px; margin: 10px 0; font-weight: 700; line-height: 1.3; }
        .card-text { color: #888; font-size: 14px; line-height: 1.6; }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 32px; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">WILDLIFE <span>PLANET</span></div>
        <div class="nav-links">
            <a href="#">Stories</a>
            <a href="#">Animals</a>
            <a href="#">About</a>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-content">
            <p>Feature Story</p>
            <h1>जंगल के अनसुने रहस्य</h1>
        </div>
    </div>

    <div class="container">
        <a href="story1.html" class="card">
            <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?auto=format&fit=crop&w=500" alt="Lion">
            <div class="card-info">
                <span class="tag">Predators</span>
                <h2 class="card-title">शेर: अफ्रीका के मैदानों का असली सुल्तान</h2>
                <p class="card-text">जानिए कैसे एक शेर अपने इलाके की रक्षा करता है और शिकार की तकनीकें...</p>
            </div>
        </a>

        <a href="story2.html" class="card">
            <img src="https://images.unsplash.com/photo-1528156438644-59316022f660?auto=format&fit=crop&w=500" alt="Snake">
            <div class="card-info">
                <span class="tag">Reptiles</span>
                <h2 class="card-title">किंग कोबरा का asif khan</h2>
                <p class="card-text">दुनिया के सबसे लंबे जहरीले सांप के बारे में हैरान करने वाले तथ्य...</p>
            </div>
        </a>
    </div>

</body>
</html>
